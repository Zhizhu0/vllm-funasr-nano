name: Build and Save FunASR Image

on: [workflow_dispatch] # 允许手动在 GitHub 页面上点击运行

# 声明工作流拥有写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 彻底清理虚拟机硬盘（瞬间腾出 30GB+ 空间，防止硬盘爆满）
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker image prune --all --force
          df -h # 打印硬盘使用情况

      # 2. 极速拉取 Docker Hub 的官方 vllm 基础镜像（30 秒以内即可拉完，绝不卡死！）
      - name: Pull Base Image
        run: |
          docker pull vllm/vllm-openai:latest

      # 3. 运行临时容器：在里面安装 funasr 并且自动把模型下载到容器里
      - name: Install FunASR & Download Model
        run: |
          docker run --name temp_funasr --entrypoint "" vllm/vllm-openai:latest bash -c " \
            pip install --no-cache-dir funasr fastapi uvicorn python-multipart && \
            python3 -c \"from funasr import AutoModel; AutoModel(model='FunAudioLLM/Fun-ASR-Nano-2512', device='cpu')\" \
          "

      # 4. 将容器打包为新镜像并进行“分片压缩”
      - name: Commit and Compress Image
        run: |
          # 提交修改
          docker commit \
            --change 'ENV MODELSCOPE_OFFLINE=1' \
            --change 'ENV HF_HUB_OFFLINE=1' \
            --change 'ENTRYPOINT []' \
            --change 'CMD ["funasr-server", "--device", "cuda"]' \
            temp_funasr funasr-nano-all-in-one:latest
          
          # 用 -1 模式极速压缩（1~2 分钟）
          docker save funasr-nano-all-in-one:latest | gzip -1 > funasr_all_in_one.tar.gz
          
          # 将大文件切割为 1.5G 每一个的小分片
          split -b 1500M -d funasr_all_in_one.tar.gz funasr_all_in_one.tar.gz.part
          
          # 删除原本的 10G 大文件，防止硬盘塞满，只保留分片
          rm -f funasr_all_in_one.tar.gz

      # 5. 上传切片文件（改用 GitHub 官方原生极速命令行，彻底解决上传卡死、取消问题）
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 传入官方内置 Token
        run: |
          # 使用官方 gh release 命令行，--clobber 允许覆盖已有的 Release，防止重跑报错
          gh release create v1.0.0 funasr_all_in_one.tar.gz.part* \
            --title "v1.0.0" \
            --notes "Offline FunASR vLLM Image Parts" \
            --clobber
